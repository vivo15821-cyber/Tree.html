<html>

    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>

  <body>
<!-- ต้นไม้ -->

<!-- ลำต้น -->
<a-cylinder
    position="-6 1.2 -3"
    radius="0.15"
    height="2.4"
    color="#A66A2C">
</a-cylinder>

<!-- กิ่งซ้าย -->
<a-cylinder
    position="-6.3 2.2 -3"
    radius="0.05"
    height="1"
    rotation="0 0 35"
    color="#A66A2C">
</a-cylinder>

<!-- กิ่งขวา -->
<a-cylinder
    position="-5.7 2.2 -3"
    radius="0.05"
    height="1"
    rotation="0 0 -35"
    color="#A66A2C">
</a-cylinder>

<!-- พุ่มใบเขียวเข้ม -->
<a-octahedron
    position="-6.5 3 -3"
    radius="0.6"
    color="#228B22">
</a-octahedron>

<!-- พุ่มใบเขียวอ่อน -->
<a-octahedron
    position="-5.8 3.4 -3"
    radius="0.8"
    color="#9ACD32">
</a-octahedron>

<!-- พุ่มใบเขียวเข้ม -->
<a-octahedron
    position="-5.2 2.8 -3"
    radius="0.6"
    color="#2E8B57">
</a-octahedron>

<!-- พุ่มใบเขียวอ่อนเล็ก -->
<a-octahedron
